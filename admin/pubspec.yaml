name: pikuman4_admin
description: "pikuman4 어드민 도구 - 노노그램 퍼즐 생성·검증·저장용 Windows 데스크톱 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리 및 화면 이동
  get: ^4.6.6

  # 이미지 처리 (이미지 로드·리사이즈·이진화)
  image: ^4.2.0

  # 파일 선택 다이얼로그 (이미지 열기, JSON 저장 위치 선택)
  file_picker: ^8.3.7

  # 아이콘
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
